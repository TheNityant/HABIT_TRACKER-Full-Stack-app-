<!DOCTYPE html>
<html>
<head>
    <title>API Tester</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .container { max-width: 900px; background: white; padding: 20px; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #667eea; color: white; border: none; border-radius: 4px; }
        input { padding: 8px; margin: 5px; width: 200px; }
        .output { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 4px; border-left: 4px solid #667eea; max-height: 400px; overflow-y: auto; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        .success { border-left-color: #4caf50; background: #f1f8f6; }
        .error { border-left-color: #f44336; background: #fdf1f0; }
        h2 { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔧 Habit Tracker API Tester</h2>
        
        <h3>1. Login Test</h3>
        <input type="text" id="username" placeholder="Username" value="testuser123">
        <input type="password" id="password" placeholder="Password" value="password123">
        <button onclick="testLogin()">Test Login</button>
        <div id="loginOutput" class="output" style="display:none"></div>
        
        <h3>2. Get Habits Test</h3>
        <p>First login above, then click this button</p>
        <button onclick="testGetHabits()">Test Get Habits</button>
        <div id="habitsOutput" class="output" style="display:none"></div>
        
        <h3>3. Check Browser Console</h3>
        <p>Open F12 → Console tab to see detailed logging</p>
        <button onclick="showConsoleInstructions()">Show Instructions</button>
        <div id="consoleOutput" class="output" style="display:none"></div>
    </div>

    <script>
        // Store user data for testing
        let testUser = null;
        const BACKEND_URL = 'https://habit-tracker-backend-o9bs.onrender.com';

        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const outputDiv = document.getElementById('loginOutput');
            outputDiv.style.display = 'block';
            outputDiv.className = 'output';

            try {
                outputDiv.innerHTML = '⏳ Logging in...';
                
                const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                console.log('✅ Login response status:', response.status);
                const data = await response.json();
                console.log('✅ Login response data:', data);

                if (!response.ok) {
                    outputDiv.className = 'output error';
                    outputDiv.innerHTML = `<pre>❌ Login Failed
Status: ${response.status}
Error: ${JSON.stringify(data, null, 2)}</pre>`;
                    return;
                }

                testUser = data;
                outputDiv.className = 'output success';
                outputDiv.innerHTML = `<pre>✅ Login Successful

User Data:
${JSON.stringify(data, null, 2)}

User ID: ${data.user_id || data.id}
Username: ${data.username}</pre>`;
                
                console.log('✅ Test user stored:', testUser);
            } catch (error) {
                outputDiv.className = 'output error';
                outputDiv.innerHTML = `<pre>❌ Login Error
${error.message}</pre>`;
                console.error('❌ Login error:', error);
            }
        }

        async function testGetHabits() {
            const outputDiv = document.getElementById('habitsOutput');
            outputDiv.style.display = 'block';
            outputDiv.className = 'output';

            if (!testUser) {
                outputDiv.className = 'output error';
                outputDiv.innerHTML = '<pre>❌ No logged-in user. Login first!</pre>';
                return;
            }

            try {
                const userId = testUser.user_id || testUser.id;
                const endpoint = `${BACKEND_URL}/api/habits/${userId}`;
                
                outputDiv.innerHTML = `⏳ Fetching habits from: ${endpoint}`;
                
                console.log(`🔗 Calling: ${endpoint}`);
                
                const response = await fetch(endpoint, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });

                console.log('✅ Get habits response status:', response.status);
                const data = await response.json();
                console.log('✅ Get habits response data:', data);

                if (!response.ok) {
                    outputDiv.className = 'output error';
                    outputDiv.innerHTML = `<pre>❌ Get Habits Failed
Status: ${response.status}
User ID: ${userId}
Endpoint: ${endpoint}
Error: ${JSON.stringify(data, null, 2)}</pre>`;
                    return;
                }

                outputDiv.className = 'output success';
                outputDiv.innerHTML = `<pre>✅ Habits Loaded Successfully

User ID: ${userId}
Endpoint: ${endpoint}
Count: ${Array.isArray(data) ? data.length : 0}

Response:
${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                outputDiv.className = 'output error';
                outputDiv.innerHTML = `<pre>❌ Get Habits Error
${error.message}</pre>`;
                console.error('❌ Get habits error:', error);
            }
        }

        function showConsoleInstructions() {
            const outputDiv = document.getElementById('consoleOutput');
            outputDiv.style.display = 'block';
            outputDiv.className = 'output success';
            outputDiv.innerHTML = `<pre>📍 How to Check Browser Console:

1. Press F12 on your keyboard
2. Click the "Console" tab at the top
3. You'll see all the debugging messages

What to look for:
✅ 🔍 getAllHabits called
✅ 📌 currentUser: {user_id: 123, ...}
✅ 📍 Fetching habits for userId: 123
✅ 🔗 API Endpoint: /api/habits/123
✅ ✅ API Response: [...]
✅ 📦 Habits after processing: [...]

If you see ❌ errors, that tells us what went wrong!</pre>`;
        }

        console.log('🧪 API Tester Loaded. Use buttons above to test.');
    </script>
</body>
</html>
